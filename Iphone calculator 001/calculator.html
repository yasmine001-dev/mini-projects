<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculator</title>
    <link rel="stylesheet" href="calculatorStyle.css" />
  </head>
  <body>
    <div id="calculator">
      <div id="result-container"><p id="result">0</p></div>

      <!-- + / - / × / ÷ -->
      <div id="buttons-container">
        <button id="clear-btn" class="grey-btn">AC</button>
        <button class="grey-btn">+/-</button>
        <button class="grey-btn">%</button>

        <button class="orang-btn">÷</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="orang-btn">×</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="orang-btn">-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="orang-btn">+</button>

        <button class="span-btn">0</button>
        <button>.</button>
        <button class="orang-btn">=</button>
      </div>
    </div>
    <script src="calculatorScript.js"></script>
  </body>
</html>
